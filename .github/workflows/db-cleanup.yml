name: Database Cleanup

on:
  schedule:
    - cron: '0 3 * * 0' # Every Sunday at 3:00 AM UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete analytics data older than 3 months
        env:
          DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
        run: |
          psql "$DATABASE_URL" <<'SQL'
          DO $$
          DECLARE
            cutoff timestamptz := NOW() - INTERVAL '3 months';
            deleted_count integer;
          BEGIN
            DELETE FROM event_data WHERE created_at < cutoff;
            GET DIAGNOSTICS deleted_count = ROW_COUNT;
            RAISE NOTICE 'Deleted % rows from event_data', deleted_count;

            DELETE FROM session_data WHERE created_at < cutoff;
            GET DIAGNOSTICS deleted_count = ROW_COUNT;
            RAISE NOTICE 'Deleted % rows from session_data', deleted_count;

            DELETE FROM revenue WHERE created_at < cutoff;
            GET DIAGNOSTICS deleted_count = ROW_COUNT;
            RAISE NOTICE 'Deleted % rows from revenue', deleted_count;

            DELETE FROM website_event WHERE created_at < cutoff;
            GET DIAGNOSTICS deleted_count = ROW_COUNT;
            RAISE NOTICE 'Deleted % rows from website_event', deleted_count;

            DELETE FROM session WHERE created_at < cutoff;
            GET DIAGNOSTICS deleted_count = ROW_COUNT;
            RAISE NOTICE 'Deleted % rows from session', deleted_count;
          END $$;
          SQL

      - name: Vacuum tables to reclaim disk space
        env:
          DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
        run: |
          psql "$DATABASE_URL" -c "VACUUM FULL website_event;"
          psql "$DATABASE_URL" -c "VACUUM FULL event_data;"
          psql "$DATABASE_URL" -c "VACUUM FULL session;"
          psql "$DATABASE_URL" -c "VACUUM FULL session_data;"
          psql "$DATABASE_URL" -c "VACUUM FULL revenue;"
